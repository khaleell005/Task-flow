<link rel="stylesheet" href="style.css">
<div class="app">
  <header class="app-header">
    <div class="app-title">
      <div class="app-title-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2" y="2" width="14" height="14" rx="3" stroke="#fff" stroke-width="1.5"/>
          <path d="M5.5 9l2.5 2.5 4.5-4.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      TaskFlow
    </div>
    <p class="app-subtitle">Stay organised. Get things done.</p>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num" id="statPending">0</div><div class="stat-lbl">Pending</div></div>
      <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-lbl">Done</div></div>
    </div>
  </header>

  <div class="content">
    <div class="top-bar">
      <span class="section-label">My Tasks</span>
      <button class="btn-add-new" onclick="openModal()" aria-label="Add new task">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 3v10M3 8h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
        New Task
      </button>
    </div>
    <ul class="cards-list" id="cardsList" aria-label="Task list"></ul>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">New Task</h3>
      <button class="modal-close" onclick="closeModal()" aria-label="Close modal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field" id="field-title">
        <label for="fTitle">Task Title *</label>
        <input type="text" id="fTitle" placeholder="e.g. Design the landing page" maxlength="120">
        <p class="field-error">Please enter a task title.</p>
      </div>
      <div class="field">
        <label for="fDesc">Description</label>
        <textarea id="fDesc" placeholder="Add notes or details..."></textarea>
      </div>
      <div class="row2">
        <div class="field" id="field-priority">
          <label for="fPriority">Priority *</label>
          <select id="fPriority">
            <option value="">Select priority</option>
            <option value="0">Low</option>
            <option value="1">Medium</option>
            <option value="2">High</option>
          </select>
          <p class="field-error">Please select a priority.</p>
        </div>
        <div class="field" id="field-status">
          <label for="fStatus">Status</label>
          <select id="fStatus">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>
      </div>
      <div class="field" id="field-due">
        <label for="fDue">Due Date *</label>
        <input type="date" id="fDue">
        <p class="field-error">Please pick a due date.</p>
      </div>
      <div class="field">
        <label>Tags</label>
        <div class="tags-input">
          <input type="text" id="fTagInput" placeholder="e.g. design" maxlength="24" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}">
          <button class="btn-tag-add" onclick="addTag()" type="button">Add</button>
        </div>
        <div class="tags-preview" id="fTagsPreview"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btnSave" onclick="saveTask()">Add Task</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
